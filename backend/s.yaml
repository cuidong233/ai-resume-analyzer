edition: 3.0.0
name: ai-resume-analyzer
access: default

resources:
  resume-api:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: ai-resume-analyzer
      runtime: custom.debian10
      code: .fc/code
      handler: not-used
      timeout: 60
      memorySize: 1024
      cpu: 0.5
      diskSize: 512
      environmentVariables:
        PATH: /opt/python3.10/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin
        PYTHONPATH: /code
        ALLOWED_ORIGINS: "*"
      layers:
        - acs:fc:cn-hangzhou:official:layers/Python310/versions/3
      customRuntimeConfig:
        command:
          - /opt/python3.10/bin/python3.10
          - serverless_handler.py
        port: 9000
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
